<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karting Strategy v1.0</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="screen-setup" class="screen active"></div>
  <div id="screen-dash" class="screen"></div>
  <style>
    #sp-topnav { position:fixed;top:0;left:0;z-index:9999;display:flex;align-items:center;gap:10px;padding:12px 18px; }
    #sp-topnav .sp-nav-user { font-size:11px;color:#7A8A9E;font-family:'JetBrains Mono',monospace; }
    #sp-topnav .sp-nav-btn { font-size:11px;color:#8A9AAE;background:none;border:1px solid #2A3848;border-radius:3px;padding:5px 12px;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;transition:color .15s,border-color .15s; }
    #sp-topnav .sp-nav-btn:hover { color:#EDF0F4;border-color:#4E5E72; }
  </style>
  <div id="sp-topnav">
    <span class="sp-nav-user" id="sp-nav-user"></span>
    <a href="/profile.html" class="sp-nav-btn">Mi perfil</a>
    <button class="sp-nav-btn" onclick="signOutSP()">Salir</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.supabaseClient = supabase.createClient('https://nyybrybnvflwbdwdqpwa.supabase.co','sb_publishable_sXd5RxPkUkDlopEW4Rah9g_WpocEK5H');
    window._spRolePromise = new Promise(function(resolve) {
      if (navigator.userAgent.includes('Electron')) { resolve('admin'); return; }
      window.supabaseClient.auth.getSession().then(function(r) {
        if (!r.data.session) { window.location.replace('/landing.html'); resolve('user'); return; }
        if (new URLSearchParams(location.search).has('hub')) { resolve('admin'); return; }
        window.supabaseClient.from('profiles').select('role,name').eq('id', r.data.session.user.id).single().then(function(res) {
          var role = res.data?.role || 'user';
          var name = res.data?.name || r.data.session.user.email;
          document.getElementById('sp-nav-user').textContent = name;
          if (role === 'admin') { window.location.replace('/hub.html'); }
          resolve(role);
        });
      });
    });
    async function signOutSP(){ await window.supabaseClient.auth.signOut(); window.location.replace('/landing.html'); }
  </script>
  <script src="circuits.js"></script>
  <script src="state.js"></script>
  <script src="clock.js"></script>
  <script src="apex-protocol.js"></script>
  <script src="apex-connector.js"></script>
  <script src="logger-connector.js"></script>
  <script src="replay-connector.js"></script>
  <script src="helpers.js"></script>
  <script src="setup.js"></script>
  <script src="analysis.js"></script>
  <script src="sprint.js"></script>
  <script src="en-state.js"></script>
  <script src="en-grid.js"></script>
  <script src="en-advanced.js"></script>
  <script src="en-team.js"></script>
  <script src="en-strategy.js"></script>
  <script src="app.js"></script>
</body>
</html>
